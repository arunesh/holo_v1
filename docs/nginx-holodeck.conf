# Nginx site for myholodeck.app -> Holodeck (pm2 uvicorn on :8350).
# Install: sudo cp docs/nginx-holodeck.conf /etc/nginx/sites-available/holodeck
#          sudo nginx -t && sudo systemctl reload nginx
#
# Fixes vs. the original: server_name was myholodeck.com; the domain is myholodeck.app.
# Note: /etc/ssl/certs/cf_holodeck.crt is a Cloudflare origin cert — if it was issued
# for myholodeck.com, reissue it for myholodeck.app if Cloudflare SSL mode is
# "Full (strict)". Plain "Full" does not verify the hostname, so it works as is.
server {
    listen 443 ssl;
    listen 80;
    server_name myholodeck.app www.myholodeck.app;
    ssl_certificate /etc/ssl/certs/cf_holodeck.crt;
    ssl_certificate_key /etc/ssl/private/cf_holodeck.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://localhost:8350;
        proxy_http_version 1.1;

        # Websockets (/ws) need the Upgrade headers.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 600s;
        proxy_connect_timeout 60s;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
